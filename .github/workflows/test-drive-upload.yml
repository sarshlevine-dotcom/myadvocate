name: Test Google Drive Upload

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create service account file
        run: |
  cat <<EOF > service-account.json
  ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
  EOF
      - name: Create test file
        run: echo "MyAdvocate test upload works" > test.txt

      - name: Install Google APIs client
        run: npm install googleapis

      - name: Upload file to Google Drive
        env:
          GDRIVE_ROOT_FOLDER_ID: ${{ secrets.GDRIVE_ROOT_FOLDER_ID }}
        run: |
          cat > upload.js <<'EOF'
          const fs = require('fs');
          const { google } = require('googleapis');

          async function main() {
            const auth = new google.auth.GoogleAuth({
              keyFile: 'service-account.json',
              scopes: ['https://www.googleapis.com/auth/drive'],
            });

            const drive = google.drive({ version: 'v3', auth });

            const fileMetadata = {
              name: 'test.txt',
              parents: [process.env.GDRIVE_ROOT_FOLDER_ID],
            };

            const media = {
              mimeType: 'text/plain',
              body: fs.createReadStream('test.txt'),
            };

            const res = await drive.files.create({
              resource: fileMetadata,
              media,
              fields: 'id,name',
            });

            console.log('Uploaded:', res.data);
          }

          main().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF
          node upload.js
