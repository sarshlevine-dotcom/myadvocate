name: Canonical Docs Sync v2

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create service account file
        run: |
          cat > service-account.json <<'EOF'
          ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          EOF

      - name: Install Google APIs client
        run: npm install googleapis

      - name: Sync canonical docs to Drive (tightened strategy)
        env:
          GDRIVE_FOLDER_00_SYSTEM: ${{ secrets.GDRIVE_FOLDER_00_SYSTEM }}
          GDRIVE_FOLDER_01_STRATEGY: ${{ secrets.GDRIVE_FOLDER_01_STRATEGY }}
          GDRIVE_FOLDER_04_AUTOMATION: ${{ secrets.GDRIVE_FOLDER_04_AUTOMATION }}
          GDRIVE_FOLDER_05_COMPLIANCE: ${{ secrets.GDRIVE_FOLDER_05_COMPLIANCE }}
        run: |
          cat > sync-canonical-docs-v2.js <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const { google } = require('googleapis');

          const mappings = [
            { local: 'SYSTEM.md', folder: process.env.GDRIVE_FOLDER_00_SYSTEM, mode: 'single' },
            { local: 'CLAUDE.md', folder: process.env.GDRIVE_FOLDER_00_SYSTEM, mode: 'single' },
            { local: 'docs/registry/README.md', folder: process.env.GDRIVE_FOLDER_00_SYSTEM, mode: 'single' },
            { local: 'docs/registry/canonical-index.json', folder: process.env.GDRIVE_FOLDER_00_SYSTEM, mode: 'single' },
            { local: 'docs/pmp', folder: process.env.GDRIVE_FOLDER_01_STRATEGY, mode: 'strategy_latest' },
            { local: 'docs/agents', folder: process.env.GDRIVE_FOLDER_04_AUTOMATION, mode: 'all' },
            { local: 'docs/context', folder: process.env.GDRIVE_FOLDER_04_AUTOMATION, mode: 'all' },
            { local: 'docs/cost', folder: process.env.GDRIVE_FOLDER_04_AUTOMATION, mode: 'all' },
            { local: 'docs/security', folder: process.env.GDRIVE_FOLDER_05_COMPLIANCE, mode: 'all' },
            { local: 'docs/social', folder: process.env.GDRIVE_FOLDER_05_COMPLIANCE, mode: 'all' }
          ];

          function flattenFiles(targetPath) {
            if (!fs.existsSync(targetPath)) return [];
            const stat = fs.statSync(targetPath);
            if (stat.isFile()) return [targetPath];
            const out = [];
            for (const entry of fs.readdirSync(targetPath)) {
              out.push(...flattenFiles(path.join(targetPath, entry)));
            }
            return out;
          }

          function versionInfo(filePath) {
            const base = path.basename(filePath);
            const match = base.match(/^(.*?)(_v|[- ]v)(\d+)(\.[^.]+)$/i);
            if (!match) return null;
            return {
              group: `${match[1]}${match[4]}`.toLowerCase(),
              version: parseInt(match[3], 10),
            };
          }

          function latestVersionOnly(files) {
            const nonVersioned = [];
            const byGroup = new Map();
            for (const file of files) {
              const info = versionInfo(file);
              if (!info) {
                nonVersioned.push(file);
                continue;
              }
              const current = byGroup.get(info.group);
              if (!current || info.version > current.version) {
                byGroup.set(info.group, { file, version: info.version });
              }
            }
            return [...nonVersioned, ...Array.from(byGroup.values()).map(v => v.file)].sort();
          }

          function filesForMapping(mapping) {
            const files = flattenFiles(mapping.local);
            if (mapping.mode === 'strategy_latest') return latestVersionOnly(files);
            return files;
          }

          async function findExistingFile(drive, folderId, name) {
            const safeName = name.replace(/'/g, "\\'");
            const q = [`'${folderId}' in parents`, `name = '${safeName}'`, `trashed = false`].join(' and ');
            const res = await drive.files.list({
              q,
              fields: 'files(id,name)',
              includeItemsFromAllDrives: true,
              supportsAllDrives: true,
            });
            return res.data.files?.[0] || null;
          }

          function mimeTypeFor(filePath) {
            const ext = path.extname(filePath).toLowerCase();
            if (ext === '.json') return 'application/json';
            if (ext === '.docx') return 'application/vnd.openxmlformats-officedocument.wordprocessingml.document';
            if (ext === '.md') return 'text/markdown';
            if (ext === '.xlsx') return 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
            if (ext === '.txt') return 'text/plain';
            return 'application/octet-stream';
          }

          async function uploadOrUpdate(drive, filePath, folderId) {
            const name = path.basename(filePath);
            const media = { mimeType: mimeTypeFor(filePath), body: fs.createReadStream(filePath) };
            const existing = await findExistingFile(drive, folderId, name);
            if (existing) {
              await drive.files.update({ fileId: existing.id, media, fields: 'id,name', supportsAllDrives: true });
              console.log(`Updated: ${name}`);
            } else {
              await drive.files.create({
                resource: { name, parents: [folderId] },
                media,
                fields: 'id,name',
                supportsAllDrives: true,
              });
              console.log(`Uploaded: ${name}`);
            }
          }

          async function main() {
            const auth = new google.auth.GoogleAuth({
              keyFile: 'service-account.json',
              scopes: ['https://www.googleapis.com/auth/drive.file'],
            });
            const authClient = await auth.getClient();
            const drive = google.drive({ version: 'v3', auth: authClient });

            for (const mapping of mappings) {
              if (!mapping.folder) {
                console.log(`Skipping ${mapping.local}: missing folder secret`);
                continue;
              }
              for (const filePath of filesForMapping(mapping)) {
                await uploadOrUpdate(drive, filePath, mapping.folder);
              }
            }
          }

          main().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF
          node sync-canonical-docs-v2.js
