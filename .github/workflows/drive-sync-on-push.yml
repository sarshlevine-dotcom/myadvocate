name: Product Docs Sync

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create service account file
        run: |
          cat > service-account.json <<'EOF'
          ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          EOF

      - name: Install Google APIs client
        run: npm install googleapis

      - name: Sync product docs
        env:
          GDRIVE_FOLDER_02_PRODUCT: ${{ secrets.GDRIVE_FOLDER_02_PRODUCT }}
        run: |
          cat > sync-product.js <<'EOF'
          const fs = require('fs');
          const { google } = require('googleapis');

          const FILES = [
            'docs/intelligence/MyAdvocate_Case_Engine_V4_OptionB_Full_Spec.docx'
          ];

          async function upload(drive, filePath, folderId) {
            const name = filePath.split('/').pop();

            const res = await drive.files.list({
              q: `'${folderId}' in parents and name='${name}' and trashed=false`,
              fields: 'files(id)',
              includeItemsFromAllDrives: true,
              supportsAllDrives: true,
            });

            const fileId = res.data.files?.[0]?.id;

            const media = {
              mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
              body: fs.createReadStream(filePath),
            };

            if (fileId) {
              await drive.files.update({
                fileId,
                media,
                supportsAllDrives: true,
              });
              console.log(`Updated: ${name}`);
            } else {
              await drive.files.create({
                requestBody: {
                  name,
                  parents: [folderId],
                },
                media,
                supportsAllDrives: true,
              });
              console.log(`Uploaded: ${name}`);
            }
          }

          async function main() {
            const auth = new google.auth.GoogleAuth({
              keyFile: 'service-account.json',
              scopes: ['https://www.googleapis.com/auth/drive.file'],
            });

            const authClient = await auth.getClient();
            const drive = google.drive({ version: 'v3', auth: authClient });

            for (const file of FILES) {
              await upload(drive, file, process.env.GDRIVE_FOLDER_02_PRODUCT);
            }
          }

          main().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF

          node sync-product.js
